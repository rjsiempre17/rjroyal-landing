<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RJ Royal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #eee;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    const WHATSAPP_NUMBER = '5491128183910';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdod2RwcHN3enpscnRhY3JzemJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NDk1NjUsImV4cCI6MjA5NDAyNTU2NX0.UXK33HLozGKZwvqWcWkDkzd_hnwpUKPZe5lmhhmREDs';

    function generateCode() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = '';
      for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return code;
    }

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name) || '';
    }

    async function saveLead(code, campaign, ad) {
      try {
        await fetch('https://ghwdppswzzlrtacrszbq.supabase.co/rest/v1/leads', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ code: code, campaign: campaign, ad: ad, contacted: false })
        });
      } catch (e) {
        console.error('Error guardando lead:', e);
      }
    }

    const code = generateCode();
    const campaign = getParam('utm_campaign');
    const ad = getParam('utm_content');
    const message = encodeURIComponent(`🎁 ${code} 🎁 Hola quiero cargar con mi bono extra`);

    saveLead(code, campaign, ad);
    window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
  </script>
</body>
</html>
